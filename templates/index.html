<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olivetti Face Recognizer</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d1117; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161b22; border-radius: 16px; padding: 40px; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    h1 { color: #a78bfa; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; }
    .upload-area { border: 2px dashed #a78bfa; border-radius: 12px; padding: 40px; cursor: pointer; margin-bottom: 20px; }
    input[type=file] { display: none; }
    button { background: #a78bfa; color: #fff; border: none; padding: 14px 40px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    button:hover { background: #7c3aed; }
    .result { background: #1f2937; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; display: none; }
    .result h3 { color: #a78bfa; margin-bottom: 12px; }
    .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .result-value { font-weight: bold; color: #fff; }
    #preview { max-width: 100%; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧠 Face Recognizer</h1>
    <p>Olivetti Faces · DecisionTree Classifier</p>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>Click to upload a face image</p>
      <p style="font-size:12px">(64×64 greyscale recommended)</p>
      <img id="preview" src="" alt="" style="display:none"/>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)"/>
    <button onclick="predict()">Predict Subject</button>
    <div class="result" id="result">
      <h3>Prediction Result</h3>
      <div class="result-row">
        <span>Predicted Subject ID</span>
        <span class="result-value" id="subjectId"></span>
      </div>
      <div class="result-row">
        <span>Confidence</span>
        <span class="result-value" id="confidence"></span>
      </div>
    </div>
  </div>
  <script>
    function previewImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = document.getElementById('preview');
        img.src = ev.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    async function predict() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { alert('Please upload an image first!'); return; }
      const formData = new FormData();
      formData.append('image', file);
      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('subjectId').textContent = 'Subject #' + data.predicted_class;
      document.getElementById('confidence').textContent = data.confidence;
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
